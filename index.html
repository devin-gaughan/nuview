<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NuView — LArTPC Event Display</title>
<style>
  body { background:#0A0514; color:#F5F1E8; font-family:system-ui,sans-serif;
         margin:0; padding:16px; }
  h1 { font-size:18px; color:#00E5D0; margin:0 0 4px; letter-spacing:1px; }
  #meta { font-size:13px; color:#9a8fb8; margin-bottom:10px; min-height:18px; }
  .plane { margin-bottom:14px; }
  .plane label { font-size:12px; color:#FFD54F; display:block; margin-bottom:3px; }
  canvas { background:#120a24; border:1px solid #2a1b4d; border-radius:6px;
           width:100%; display:block; }
  #drop { border:1px dashed #6A1B9A; border-radius:8px; padding:10px 14px;
          font-size:13px; color:#c9bfe0; margin-bottom:14px; }
  input[type=file] { color:#c9bfe0; font-size:13px; }
  #bar button { background:#1A0B3D; color:#c9bfe0; border:1px solid #6A1B9A;
    border-radius:5px; padding:4px 12px; margin-right:6px; font-size:12px;
    cursor:pointer; }
  #bar button.on { background:#6A1B9A; color:#F5F1E8; }
  #bar { margin-bottom:12px; }
  #legend { font-size:11px; color:#9a8fb8; margin-bottom:8px; }
  #legend span { margin-right:12px; }
  #view3d canvas { height:520px; cursor:grab; }
</style>
</head>
<body>
<h1>NUVIEW · LArTPC EVENT DISPLAY</h1>
<div id="meta">Load an event JSON produced by extract_event.py</div>
<div id="drop">Drop event JSON files here or <input type="file" id="file" accept=".json" multiple></div>
<div id="bar">
  <select id="evsel" style="background:#1A0B3D;color:#c9bfe0;border:1px solid #6A1B9A;border-radius:5px;padding:4px 8px;margin-right:10px;font-size:12px;display:none"></select>
  <button id="bCharge" class="on">Charge</button>
  <button id="bTruth">Truth</button>
  <button id="b2d" class="on">2D Planes</button>
  <button id="b3d">3D</button>
  <button id="bPng">Export PNG</button>
</div>
<div id="legend"></div>
<div id="view2d">
<div class="plane"><label>Plane 0 (induction U) — wire vs drift time</label>
  <canvas id="c0" height="220"></canvas></div>
<div class="plane"><label>Plane 1 (induction V) — wire vs drift time</label>
  <canvas id="c1" height="220"></canvas></div>
<div class="plane"><label>Plane 2 (collection Y) — wire vs drift time</label>
  <canvas id="c2" height="220"></canvas></div>
</div>
<div id="view3d" style="display:none">
  <label style="font-size:12px;color:#FFD54F">True particle trajectories — drag to orbit, shift-drag or right-drag to pan, wheel to zoom, R to reset</label>
  <canvas id="c3d" height="520"></canvas>
</div>
<script>
"use strict";
// Charge colormap: void -> violet -> teal -> gold -> ivory
function cmap(t) {
  const stops = [
    [0.00, [26, 11, 61]], [0.35, [106, 27, 154]],
    [0.65, [0, 229, 208]], [0.85, [255, 213, 79]], [1.00, [245, 241, 232]]
  ];
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const [t0, c0] = stops[i-1], [t1, c1] = stops[i];
      const u = (t - t0) / (t1 - t0);
      return c0.map((v, k) => Math.round(v + u * (c1[k] - v)));
    }
  }
  return stops[stops.length - 1][1];
}

let colorMode = "charge", viewMode = "2d";
const CAT = [
  { name: "e±",  test: p => Math.abs(p) === 11,   rgb: [0, 229, 208] },
  { name: "μ±",  test: p => Math.abs(p) === 13,   rgb: [186, 104, 255] },
  { name: "γ",   test: p => p === 22,             rgb: [255, 213, 79] },
  { name: "p",   test: p => p === 2212,           rgb: [233, 30, 99] },
  { name: "π±",  test: p => Math.abs(p) === 211,  rgb: [100, 221, 23] },
  { name: "other", test: () => true,              rgb: [255, 138, 101] },
];
const COSMIC_RGB = [95, 105, 130];
function pcat(pdg) { return CAT.find(c => c.test(pdg)); }

function minmax(a) {
  let lo = a[0], hi = a[0];
  for (let i = 1; i < a.length; i++) { if (a[i] < lo) lo = a[i]; if (a[i] > hi) hi = a[i]; }
  return [lo, hi];
}
function ticks(lo, hi, n) {
  const span = hi - lo || 1, raw = span / n;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const step = [1, 2, 5, 10].map(m => m * mag).find(s => span / s <= n) || 10 * mag;
  const out = [];
  for (let v = Math.ceil(lo / step) * step; v <= hi; v += step) out.push(v);
  return out;
}

function drawPlane(canvas, d, particles, meta, planeIdx) {
  const dpr = devicePixelRatio;
  const ctx = canvas.getContext("2d");
  canvas.style.height = "250px";
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = 250 * dpr;
  ctx.fillStyle = "#120a24";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!d || d.wire.length === 0) return;
  const mL = 54 * dpr, mB = 32 * dpr, mT = 8 * dpr, mR = 10 * dpr;
  const W = canvas.width - mL - mR, H = canvas.height - mT - mB;
  const [wmin, wmax] = minmax(d.wire);
  const [tmin, tmax] = minmax(d.time);
  const X = w => mL + (w - wmin) / (wmax - wmin || 1) * W;
  const Y = t => mT + (1 - (t - tmin) / (tmax - tmin || 1)) * H;
  // frame, ticks, labels
  ctx.strokeStyle = "#3a2a63"; ctx.lineWidth = dpr;
  ctx.strokeRect(mL, mT, W, H);
  ctx.fillStyle = "#c9bfe0"; ctx.font = `${12 * dpr}px system-ui`;
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  for (const v of ticks(wmin, wmax, 8)) {
    ctx.fillRect(X(v) - 0.5 * dpr, mT + H, dpr, 4 * dpr);
    ctx.fillText(v, X(v), mT + H + 6 * dpr);
  }
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  for (const v of ticks(tmin, tmax, 5)) {
    ctx.fillRect(mL - 4 * dpr, Y(v) - 0.5 * dpr, 4 * dpr, dpr);
    ctx.fillText(v, mL - 6 * dpr, Y(v));
  }
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  ctx.fillText("wire number", mL + W / 2, canvas.height - 3 * dpr);
  ctx.save();
  ctx.translate(11 * dpr, mT + H / 2); ctx.rotate(-Math.PI / 2);
  ctx.textBaseline = "top";
  ctx.fillText("drift time (ticks)", 0, 0);
  ctx.restore();
  // charge scale: clip at 97th percentile so one bright hit doesn't wash out the rest
  const sorted = [...d.charge].sort((a, b) => a - b);
  const qhi = sorted[Math.floor(sorted.length * 0.97)] || 1;
  const qlo = sorted[0];
  const px = Math.max(1.2 * dpr, W / (wmax - wmin + 1));
  ctx.save();
  ctx.beginPath(); ctx.rect(mL, mT, W, H); ctx.clip();
  for (let i = 0; i < d.wire.length; i++) {
    const x = X(d.wire[i]);
    const y = Y(d.time[i]);
    const q = Math.min(1, Math.max(0, (d.charge[i] - qlo) / (qhi - qlo || 1)));
    let r, g, b, alpha;
    if (colorMode === "truth" && d.truth) {
      const slot = d.truth[i];
      if (slot < 0) { [r, g, b] = COSMIC_RGB; alpha = 0.18; }
      else { [r, g, b] = pcat(particles[slot].pdg).rgb; alpha = 0.9; }
    } else {
      [r, g, b] = cmap(q); alpha = 0.35 + 0.65 * q;
    }
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fillRect(x, y, px, px);
  }
  // true neutrino vertex crosshair (per-plane wire coordinates)
  if (meta && meta.nu_vtx_wire_pos) {
    const x = X(meta.nu_vtx_wire_pos[planeIdx]), y = Y(meta.nu_vtx_wire_time);
    ctx.strokeStyle = "rgba(255,213,79,0.9)"; ctx.lineWidth = dpr;
    ctx.beginPath();
    ctx.moveTo(x - 11 * dpr, y); ctx.lineTo(x + 11 * dpr, y);
    ctx.moveTo(x, y - 11 * dpr); ctx.lineTo(x, y + 11 * dpr);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, 6 * dpr, 0, 7); ctx.stroke();
  }
  ctx.restore();
}

function render(data) {
  const m = data.meta;
  const pdg = { 12: "νe", 14: "νμ", "-12": "ν̄e", "-14": "ν̄μ" }[m.nu_pdg] || m.nu_pdg;
  document.getElementById("meta").textContent =
    `run/subrun/event ${m.event_id.join("/")} · ${pdg} ` +
    `${m.is_cc ? "CC" : "NC"} · Eν = ${m.nu_energy_gev.toFixed(2)} GeV · ` +
    `vertex (${m.nu_vtx_cm.map(v => v.toFixed(0)).join(", ")}) cm · ` +
    `${["0","1","2"].reduce((n,p) => n + data.planes[p].wire.length, 0)} hits`;
  document.getElementById("legend").innerHTML = (colorMode === "truth"
    ? CAT.map(c => `<span style="color:rgb(${c.rgb})">■ ${c.name}</span>`).join("")
      + `<span style="color:rgb(${COSMIC_RGB})">■ cosmic/data</span>`
    : `<span>charge (ADC integral, 97th-pct clip)</span>` +
      `<span style="display:inline-block;width:140px;height:9px;vertical-align:middle;` +
      `border-radius:3px;background:linear-gradient(90deg,#1A0B3D,#6A1B9A 35%,` +
      `#00E5D0 65%,#FFD54F 85%,#F5F1E8)"></span><span>low → high</span>`)
    + `<span style="color:#FFD54F">⊕ true ν vertex</span>`;
  document.getElementById("view2d").style.display = viewMode === "2d" ? "" : "none";
  document.getElementById("view3d").style.display = viewMode === "3d" ? "" : "none";
  if (viewMode === "2d")
    for (const p of ["0", "1", "2"])
      drawPlane(document.getElementById("c" + p), data.planes[p], data.particles, data.meta, +p);
  else draw3D(data);
  window._last = data;
}

// --- minimal 3D: orthographic projection with drag-orbit/pan, no dependencies ---
let rotY = 0.6, rotX = 0.35, zoom = 1, panX = 0, panY = 0;
function draw3D(data) {
  const cv = document.getElementById("c3d"), ctx = cv.getContext("2d");
  cv.width = cv.clientWidth * devicePixelRatio;
  cv.height = 520 * devicePixelRatio;
  ctx.fillStyle = "#120a24"; ctx.fillRect(0, 0, cv.width, cv.height);
  const ps = data.particles.filter(p => p.n_hits >= 5 || p.mom_gev > 0.1);
  if (!ps.length) return;
  const ctr = data.meta.nu_vtx_cm;
  const cy = Math.cos(rotY), sy = Math.sin(rotY);
  const cx = Math.cos(rotX), sx = Math.sin(rotX);
  const S = Math.min(cv.width, cv.height) / 600 * zoom * devicePixelRatio;
  const proj = v => {
    const x = v[0] - ctr[0], y = v[1] - ctr[1], z = v[2] - ctr[2];
    const x1 = x * cy + z * sy, z1 = -x * sy + z * cy;
    const y1 = y * cx - z1 * sx;
    return [cv.width / 2 + x1 * S + panX * devicePixelRatio,
            cv.height / 2 - y1 * S + panY * devicePixelRatio];
  };
  // detector outline (MicroBooNE active volume, cm)
  ctx.strokeStyle = "rgba(106,27,154,0.5)"; ctx.lineWidth = devicePixelRatio;
  const B = [[0,-116,0],[256,-116,0],[256,116,0],[0,116,0],
             [0,-116,1037],[256,-116,1037],[256,116,1037],[0,116,1037]];
  const E = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  for (const [i, j] of E) {
    const a = proj(B[i]), b = proj(B[j]);
    ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]); ctx.stroke();
  }
  // trajectories
  for (const p of ps) {
    const c = pcat(p.pdg).rgb;
    const w = Math.min(4, 1 + Math.log10(1 + p.mom_gev * 10));
    ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.85)`;
    ctx.lineWidth = w * devicePixelRatio;
    const a = proj(p.start), b = proj(p.end);
    ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]); ctx.stroke();
  }
  // neutrino vertex
  const v = proj(ctr);
  ctx.fillStyle = "#F5F1E8";
  ctx.beginPath(); ctx.arc(v[0], v[1], 4 * devicePixelRatio, 0, 7); ctx.fill();
  ctx.strokeStyle = "#FFD54F"; ctx.lineWidth = devicePixelRatio;
  ctx.beginPath(); ctx.arc(v[0], v[1], 8 * devicePixelRatio, 0, 7); ctx.stroke();

  const dpr = devicePixelRatio;
  ctx.font = `${12 * dpr}px system-ui`;
  // dimension labels on detector box edges
  ctx.fillStyle = "rgba(201,191,224,0.75)";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const mid = (a, b) => [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  const m1 = mid(proj(B[0]), proj(B[4]));
  ctx.fillText("10.4 m (z, beam →)", m1[0], m1[1] - 10 * dpr);
  const m2 = mid(proj(B[0]), proj(B[1]));
  ctx.fillText("2.6 m (x, drift)", m2[0], m2[1] + 12 * dpr);
  const m3 = mid(proj(B[1]), proj(B[2]));
  ctx.fillText("2.3 m (y)", m3[0] + 30 * dpr, m3[1]);
  // corner orientation triad (rotation only, fixed screen position)
  const tox = cv.width - 64 * dpr, toy = cv.height - 56 * dpr, tl = 30 * dpr;
  const rot = ([x, y, z]) => {
    const x1 = x * cy + z * sy, z1 = -x * sy + z * cy;
    return [x1, y * cx - z1 * sx];
  };
  const axes = [
    ["x", [1, 0, 0], "#E91E63"], ["y", [0, 1, 0], "#64DD17"], ["z", [0, 0, 1], "#4FC3F7"]
  ];
  ctx.lineWidth = 1.5 * dpr;
  for (const [nm, vec, col] of axes) {
    const [ax, ay] = rot(vec);
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.beginPath(); ctx.moveTo(tox, toy);
    ctx.lineTo(tox + ax * tl, toy - ay * tl); ctx.stroke();
    ctx.fillText(nm, tox + ax * (tl + 9 * dpr), toy - ay * (tl + 9 * dpr));
  }
  // scale bar: pick a nice length in cm that maps to a reasonable pixel width
  const targets = [10, 25, 50, 100, 200, 500, 1000];
  const cmLen = targets.find(t => t * S >= 70 * dpr) || 1000;
  const bx = 16 * dpr, by = cv.height - 20 * dpr, bw = cmLen * S;
  ctx.strokeStyle = "#F5F1E8"; ctx.lineWidth = 2 * dpr;
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + bw, by); ctx.stroke();
  ctx.lineWidth = dpr;
  ctx.beginPath(); ctx.moveTo(bx, by - 4 * dpr); ctx.lineTo(bx, by + 4 * dpr);
  ctx.moveTo(bx + bw, by - 4 * dpr); ctx.lineTo(bx + bw, by + 4 * dpr); ctx.stroke();
  ctx.fillStyle = "#F5F1E8"; ctx.textAlign = "left"; ctx.textBaseline = "bottom";
  ctx.fillText(cmLen >= 100 ? (cmLen / 100) + " m" : cmLen + " cm", bx, by - 6 * dpr);
}

const c3d = document.getElementById("c3d");
let dragging = false, panning = false, lx = 0, ly = 0;
c3d.addEventListener("mousedown", e => {
  panning = e.shiftKey || e.button === 2 || e.button === 1;
  dragging = !panning;
  lx = e.clientX; ly = e.clientY;
});
c3d.addEventListener("contextmenu", e => e.preventDefault());
window.addEventListener("mouseup", () => { dragging = false; panning = false; });
window.addEventListener("mousemove", e => {
  if (!dragging && !panning) return;
  if (panning) { panX += e.clientX - lx; panY += e.clientY - ly; }
  else { rotY += (e.clientX - lx) * 0.01; rotX += (e.clientY - ly) * 0.01; }
  lx = e.clientX; ly = e.clientY;
  window._last && draw3D(window._last);
});
c3d.addEventListener("wheel", e => {
  e.preventDefault();
  zoom *= e.deltaY < 0 ? 1.1 : 0.9;
  window._last && draw3D(window._last);
}, { passive: false });
window.addEventListener("keydown", e => {
  if (e.key === "r" || e.key === "R") {
    rotY = 0.6; rotX = 0.35; zoom = 1; panX = 0; panY = 0;
    window._last && viewMode === "3d" && draw3D(window._last);
  }
});

function setMode(btnOn, btnOff, fn) {
  document.getElementById(btnOn).classList.add("on");
  document.getElementById(btnOff).classList.remove("on");
  fn(); window._last && render(window._last);
}
document.getElementById("bCharge").onclick = () => setMode("bCharge","bTruth", () => colorMode="charge");
document.getElementById("bTruth").onclick = () => setMode("bTruth","bCharge", () => colorMode="truth");
document.getElementById("b2d").onclick = () => setMode("b2d","b3d", () => viewMode="2d");
document.getElementById("b3d").onclick = () => setMode("b3d","b2d", () => viewMode="3d");

document.getElementById("bPng").onclick = () => {
  if (!window._last) return;
  const dpr = devicePixelRatio;
  const src = viewMode === "2d"
    ? ["c0", "c1", "c2"].map(id => document.getElementById(id))
    : [document.getElementById("c3d")];
  const w = Math.max(...src.map(c => c.width));
  const header = 36 * dpr;
  const h = header + src.reduce((s, c) => s + c.height + 8 * dpr, 0);
  const out = document.createElement("canvas");
  out.width = w; out.height = h;
  const ctx = out.getContext("2d");
  ctx.fillStyle = "#0A0514"; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = "#F5F1E8"; ctx.font = `${13 * dpr}px system-ui`;
  ctx.fillText("NuView · " + document.getElementById("meta").textContent,
               10 * dpr, 22 * dpr);
  let y = header;
  for (const c of src) { ctx.drawImage(c, 0, y); y += c.height + 8 * dpr; }
  const a = document.createElement("a");
  const m = window._last.meta;
  a.download = `nuview_ev${m.event_index}_${viewMode}_${colorMode}.png`;
  a.href = out.toDataURL("image/png");
  a.click();
};

const store = [];
function addEvent(data) {
  store.push(data);
  const sel = document.getElementById("evsel");
  sel.style.display = "";
  const m = data.meta;
  const opt = document.createElement("option");
  opt.value = store.length - 1;
  opt.textContent = `#${m.event_index} · ${m.nu_energy_gev.toFixed(2)} GeV`;
  sel.appendChild(opt);
  sel.value = store.length - 1;
  render(data);
}
document.getElementById("evsel").addEventListener("change",
  e => render(store[+e.target.value]));

function loadFile(file) {
  const r = new FileReader();
  r.onload = () => addEvent(JSON.parse(r.result));
  r.readAsText(file);
}

document.getElementById("file").addEventListener("change",
  e => [...e.target.files].forEach(loadFile));
document.getElementById("drop").addEventListener("dragover", e => e.preventDefault());
document.getElementById("drop").addEventListener("drop", e => {
  e.preventDefault();
  [...e.dataTransfer.files].forEach(loadFile);
});
window.addEventListener("resize", () => window._last && render(window._last));
</script>
</body>
</html>
